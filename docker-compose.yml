version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "8002:8000"
    depends_on:
      - db
    env_file:
      - .env
    
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"