services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    networks:
      - backend-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - backend-network

  api:
    build: .
    ports:
      - "8002:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  postgres-data: